<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดการรูปภาพ</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9; color: #333;
            font-family: 'Chakra Petch', sans-serif;
            margin: 0; padding: 30px;
        }
        h1 { text-align: center; color: #222; }
        
        .status { text-align: center; font-size: 20px; color: #FF3D00; margin-bottom: 20px; }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white; border-radius: 10px; padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
        }

        .card img {
            width: 100%; height: 260px; object-fit: cover;
            border-radius: 5px; margin-bottom: 10px;
        }

        .btn-delete {
            background-color: #ff3b3b; color: white;
            border: none; padding: 10px 20px; width: 100%;
            border-radius: 5px; font-family: 'Chakra Petch', sans-serif;
            font-size: 16px; cursor: pointer; font-weight: bold;
        }
        .btn-delete:hover { background-color: #cc0000; }
    </style>
</head>
<body>

    <h1>🛠️ Kiosk Admin Panel</h1>
    <div class="status" id="status-text">กำลังโหลดรูปภาพ...</div>

    <div class="admin-grid" id="admin-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getStorage, ref, listAll, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        
        const adminContainer = document.getElementById('admin-container');
        const statusText = document.getElementById('status-text');

        async function loadAdminImages() {
            try {
                const listRef = ref(storage, 'photos/');
                const res = await listAll(listRef);
                
                if(res.items.length === 0) {
                    statusText.innerText = "ยังไม่มีรูปภาพในระบบ";
                    return;
                }

                statusText.innerText = `พบรูปภาพทั้งหมด ${res.items.length} รูป (กำลังดึงข้อมูล...)`;

                // เรียงลำดับจากรูปใหม่ล่าสุดไปเก่า
                const sortedItems = res.items.sort((a, b) => {
                    const timeA = parseInt(a.name.split('_')[1]) || 0;
                    const timeB = parseInt(b.name.split('_')[1]) || 0;
                    return timeB - timeA;
                });

                adminContainer.innerHTML = ''; // เคลียร์ของเก่า
                statusText.innerText = `รูปภาพทั้งหมด ${res.items.length} รูป`;

                // โหลดรูปลง Card ทีละอัน
                for (const itemRef of sortedItems) {
                    const url = await getDownloadURL(itemRef);
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const img = document.createElement('img');
                    img.src = url;
                    
                    const btn = document.createElement('button');
                    btn.className = 'btn-delete';
                    btn.innerText = '🗑️ ลบภาพนี้';
                    
                    // ระบบลบรูปภาพ
                    btn.onclick = async () => {
                        if(confirm("ยืนยันการลบภาพนี้? (ลบแล้วกู้คืนไม่ได้นะ)")) {
                            btn.innerText = "กำลังลบ...";
                            btn.style.backgroundColor = "gray";
                            try {
                                await deleteObject(itemRef);
                                card.remove(); // ลบ card ออกจากหน้าจอ
                            } catch (error) {
                                alert("ลบไม่สำเร็จ กรุณาลองใหม่");
                                btn.innerText = '🗑️ ลบภาพนี้';
                                btn.style.backgroundColor = "#ff3b3b";
                            }
                        }
                    };

                    card.appendChild(img);
                    card.appendChild(btn);
                    adminContainer.appendChild(card);
                }

            } catch (error) {
                console.error("Error", error);
                statusText.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล";
            }
        }

        loadAdminImages();
    </script>
</body>
</html>
