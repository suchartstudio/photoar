<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 20px;
            background-color: #0a0a0a; color: white;
            font-family: 'Chakra Petch', sans-serif;
            overflow: hidden; /* ไม่ให้มี Scrollbar */
            height: 100vh; box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        .header {
            text-align: center; margin-bottom: 20px;
        }
        .header h1 { margin: 0; font-size: 48px; color: #00E5FF; text-transform: uppercase; letter-spacing: 2px;}

        /* ระบบ Grid อัตโนมัติ */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            grid-auto-rows: 250px; /* ความสูงพื้นฐานของช่อง */
            gap: 15px;
            flex-grow: 1;
        }

        /* กล่องใส่รูปแต่ละใบ */
        .cell {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background-color: #222;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* รูปภาพพร้อม Effect Fade ตอนสลับรูป */
        .cell img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: opacity 1s ease-in-out;
            opacity: 1;
        }

        /* คลาสสุ่มขนาด Grid ให้ดูมีมิติ (กว้าง/สูง สลับกัน) */
        .size-normal { grid-column: span 1; grid-row: span 1; }
        .size-wide { grid-column: span 2; grid-row: span 1; }
        .size-tall { grid-column: span 1; grid-row: span 2; }
        .size-large { grid-column: span 2; grid-row: span 2; }

    </style>
</head>
<body>

    <div class="header">
        <h1>✨ Event Live Gallery ✨</h1>
    </div>

    <div class="gallery-grid" id="grid-container">
        <!-- ช่อง Grid จะถูกสร้างอัตโนมัติด้วย JavaScript -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getStorage, ref, listAll, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:99057e30888de3566ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        
        let allImageUrls = []; // เก็บ URL ภาพทั้งหมด
        const TOTAL_CELLS = 18; // จำนวนช่อง Grid บนหน้าจอ (ปรับเพิ่มลดให้พอดีกับจอทีวี)
        const gridContainer = document.getElementById('grid-container');
        const cells = [];

        // 1. สร้างช่อง Grid เปล่าๆ พร้อมสุ่มขนาดสัดส่วนทิ้งไว้
        const sizes = ['size-normal', 'size-normal', 'size-normal', 'size-wide', 'size-tall', 'size-large'];
        for (let i = 0; i < TOTAL_CELLS; i++) {
            const div = document.createElement('div');
            const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
            div.className = `cell ${randomSize}`;
            
            const img = document.createElement('img');
            img.src = ""; // รอโหลดรูป
            div.appendChild(img);
            gridContainer.appendChild(div);
            cells.push(img);
        }

        // 2. ฟังก์ชันดึงภาพทั้งหมดจาก Firebase
        async function fetchImages() {
            try {
                const listRef = ref(storage, 'photos/');
                const res = await listAll(listRef);
                
                // เรียงลำดับไฟล์ตามเวลาล่าสุด (ดึงตัวเลขเวลาจากชื่อไฟล์ booth_123456.png)
                const sortedItems = res.items.sort((a, b) => {
                    const timeA = parseInt(a.name.split('_')[1]) || 0;
                    const timeB = parseInt(b.name.split('_')[1]) || 0;
                    return timeB - timeA;
                });

                // ดึง URL ของภาพ 50 ล่าสุด (เพื่อไม่ให้เบราว์เซอร์ทำงานหนักเกินไป)
                const latestItems = sortedItems.slice(0, 50);
                allImageUrls = await Promise.all(latestItems.map(item => getDownloadURL(item)));
                
                // ใส่รูปลงใน Grid ครั้งแรก
                cells.forEach((img, index) => {
                    if (allImageUrls[index] && img.src === "") {
                        img.src = allImageUrls[index];
                    }
                });

            } catch (error) {
                console.error("ดึงภาพล้มเหลว", error);
            }
        }

        // 3. ระบบสลับภาพอัตโนมัติ (Animation Effect)
        function swapRandomImage() {
            if (allImageUrls.length <= 1) return;

            // สุ่มเลือก 1 ช่อง Grid บนหน้าจอ
            const randomCellIndex = Math.floor(Math.random() * cells.length);
            const imgElement = cells[randomCellIndex];

            // สุ่มเลือกรูปภาพ 1 รูปจาก Pool ภาพทั้งหมด
            const randomUrlIndex = Math.floor(Math.random() * allImageUrls.length);
            const newUrl = allImageUrls[randomUrlIndex];

            // ถ้าภาพซ้ำกับของเดิม ให้ข้ามไป
            if (imgElement.src === newUrl) return;

            // Effect: สั่งโปร่งใส -> เปลี่ยนรูป -> สั่งเข้มขึ้น
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = newUrl;
                imgElement.style.opacity = 1;
            }, 1000); // รอ 1 วิ ให้รูปเก่า Fade out ค่อยเปลี่ยน
        }

        // --- เริ่มต้นการทำงาน ---
        fetchImages();
        // สลับรูปทุกๆ 2 วินาที เพื่อสร้างความเคลื่อนไหวให้จอ
        setInterval(swapRandomImage, 2000); 
        // ดึงข้อมูลหารูปใหม่ๆ จาก Firebase ทุกๆ 30 วินาที
        setInterval(fetchImages, 30000); 
    </script>
</body>
</html>
